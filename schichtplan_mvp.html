<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schichtplan Maschine 50 – 90 Tage Übersicht (3 Monate)</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen">
    <div class="max-w-7xl mx-auto p-4 space-y-4">
      <header
        class="bg-white rounded-xl shadow p-4 flex flex-wrap items-center justify-between gap-3"
      >
        <div class="flex items-center gap-4">
          <img
            src="./img/humbel.png"
            alt="Humbel Gear Technology"
            class="h-14 w-auto object-contain"
          />
          <div>
            <h1 class="text-2xl font-bold">
              Schichtplan Maschine 50 – 90 Tage Übersicht
            </h1>
            <p class="text-sm text-slate-500">90 Tage Übersicht</p>
          </div>
        </div>
        <div id="sessionInfo" class="text-sm font-medium"></div>
      </header>

      <section id="loginBox" class="bg-white rounded-xl shadow p-4 space-y-4">
        <div>
          <h2 class="font-semibold text-lg">Anmeldung</h2>
          <p class="text-sm text-slate-500">
            Bitte mit Supabase-Benutzer anmelden.
          </p>
        </div>

        <div class="grid md:grid-cols-3 gap-3">
          <input
            id="loginEmail"
            type="email"
            class="border rounded p-2"
            placeholder="E-Mail"
            autocomplete="username"
          />
          <input
            id="loginPassword"
            type="password"
            class="border rounded p-2"
            placeholder="Passwort"
            autocomplete="current-password"
          />
          <button
            class="px-3 py-2 rounded bg-slate-900 text-white"
            onclick="loginWithSupabase()"
          >
            Anmelden
          </button>
        </div>

        <div class="flex flex-wrap gap-2">
          <button
            class="px-3 py-2 rounded bg-slate-200"
            onclick="fillLogin('admin')"
          >
            Admin eintragen
          </button>
          <button
            class="px-3 py-2 rounded bg-slate-200"
            onclick="fillLogin('employee')"
          >
            Mitarbeiter eintragen
          </button>
          <button
            class="px-3 py-2 rounded bg-rose-100 text-rose-700"
            onclick="logoutSupabase()"
          >
            Supabase-Session löschen
          </button>
        </div>

        <div
          id="loginStatus"
          class="text-sm rounded border border-slate-200 bg-slate-50 p-3 text-slate-600"
        >
          Noch nicht angemeldet.
        </div>
      </section>

      <nav id="tabs" class="hidden gap-2 flex-wrap"></nav>

      <section id="view"></section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      window.SUPABASE_URL = "https://itntnpzqzyjfdnjdshvm.supabase.co";
      window.SUPABASE_PUBLISHABLE_KEY =
        "sb_publishable_8W69WsnRgMqEFsnUzDJFKQ_o936CsWs";

      window.TEST_ADMIN_EMAIL = "";
      window.TEST_EMPLOYEE_EMAIL = "";
    </script>
    <script src="./schichtplan_mvp.js"></script>
  </body>
</html>
